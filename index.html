<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrizal Segura</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <section id="auth-container">
        <div class="tab-selector">
            <button class="tab-btn active">Iniciar Sesión</button>
            <button onclick="window.location.href='registro.html'" class="tab-btn">Registrarse</button>
        </div>

        <div class="auth-content">
            <div id="login-block">
                <h1>Bienvenido</h1>
                <p>Ingresa tus datos de usuario.</p>
                <form id="login-form">
                    <label for="login-user">Usuario o Email</label>
                    <input type="text" id="login-user" placeholder="nombre@ejemplo.com" required>
                    
                    <label for="login-pass">Contraseña</label>
                    <input type="password" id="login-pass" placeholder="Tu contraseña" required>
                    
                    <button type="submit" class="btn-blue">Entrar</button>
                </form>
            </div>
        </div>
    </section>

    <section id="admin-section">
        <h1>Acceso Admin</h1>
        <p>Solo personal con clave maestra.</p>
        <form id="admin-form">
            <label for="admin-pass">Contraseña de Administrador</label>
            <input type="password" id="admin-pass" placeholder="Clave Maestra" required>
            <button type="submit" class="btn-red">Acceder como Administrador</button>
        </form>
    </section>

    <section id="user-space" style="display: none;">
        <div class="success-header">
            <h1>¡Acceso Exitoso!</h1>
            <p>Bienvenido a tu panel de control.</p>
            <button id="logout-btn" class="btn-gray">Cerrar Sesión</button>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
