<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Acceso Pro</title>
    <!-- Enlace al archivo CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Contenedor Principal de Autenticación (Login y Registro Juntos) -->
    <section id="auth-container">
        <!-- Selector de pestañas -->
        <div class="tab-selector">
            <button id="btn-show-login" class="tab-btn active">Iniciar Sesión</button>
            <button id="btn-show-register" class="tab-btn">Registrarse</button>
        </div>

        <div class="auth-content">
            <!-- Bloque de Inicio de Sesión -->
            <div id="login-block">
                <h1>Bienvenido</h1>
                <p>Ingresa tus datos de usuario.</p>
                <form id="login-form">
                    <label for="login-user">Usuario o Email</label>
                    <input type="text" id="login-user" placeholder="nombre@ejemplo.com" required>
                    
                    <label for="login-pass">Contraseña</label>
                    <input type="password" id="login-pass" placeholder="Tu contraseña" required>
                    
                    <button type="submit" class="btn-blue">Entrar</button>
                </form>
            </div>

            <!-- Bloque de Registro (Oculto inicialmente) -->
            <div id="register-block" style="display: none;">
                <h1>Crear Cuenta</h1>
                <p>Completa el formulario para unirte.</p>
                <form id="registro-form">
                    <label for="reg-user">Nombre de Usuario</label>
                    <input type="text" id="reg-user" placeholder="Usuario123" required>
                    
                    <label for="reg-email">Correo Electrónico</label>
                    <input type="email" id="reg-email" placeholder="correo@ejemplo.com" required>
                    
                    <label for="reg-pass">Contraseña Nueva</label>
                    <input type="password" id="reg-pass" placeholder="Mínimo 8 caracteres" required>
                    
                    <button type="submit" class="btn-blue">Registrarse Ahora</button>
                </form>
            </div>
        </div>
    </section>

    <!-- Sección Especial para Administradores -->
    <section id="admin-section">
        <h1>Acceso Admin</h1>
        <p>Solo personal con clave maestra.</p>
        <form id="admin-form">
            <label for="admin-pass">Contraseña de Administrador</label>
            <input type="password" id="admin-pass" placeholder="Clave Maestra" required>
            <button type="submit" class="btn-red">Acceder como Administrador</button>
        </form>
    </section>

    <!-- Espacio de Usuario (Se muestra tras el login) -->
    <section id="user-space" style="display: none;">
        <div class="success-header">
            <h1>¡Acceso Exitoso!</h1>
            <p>Bienvenido a tu panel de control personal.</p>
        </div>
        <div class="user-content">
            <p>Aquí puedes gestionar tu perfil y configuraciones.</p>
            <button id="logout-btn" class="btn-gray">Cerrar Sesión</button>
        </div>
    </section>

    <!-- Enlace al archivo JavaScript -->
    <script src="script.js"></script>
</body>
</html>
