<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Cuenta - Registro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <section id="auth-container">
        <div class="tab-selector">
            <button onclick="window.location.href='index.html'" class="tab-btn">Volver al Login</button>
            <button class="tab-btn active">Registrarse</button>
        </div>

        <div id="register-block">
            <h1>Crear Cuenta</h1>
            <p>Completa tus datos personales de Carrizal.</p>
            
            <form id="registro-form-completo">
                <label for="reg-name">Nombre</label>
                <input type="text" id="reg-name" placeholder="Tu nombre" required>

                <label for="reg-lastname">Apellido</label>
                <input type="text" id="reg-lastname" placeholder="Tu apellido" required>

                <label for="reg-id">Cédula</label>
                <input type="text" id="reg-id" placeholder="V-00.000.000" required>

                <label for="reg-location">¿En qué parte de Carrizal vives?</label>
                <input type="text" id="reg-location" placeholder="Ej: Montaña Alta / Colinas" required>

                <hr style="margin-bottom: 20px; border: 0; border-top: 1px solid #eee;">

                <label for="reg-email">Correo Electrónico</label>
                <input type="email" id="reg-email" placeholder="correo@ejemplo.com" required>
                
                <label for="reg-pass">Contraseña Nueva</label>
                <input type="password" id="reg-pass" placeholder="Mínimo 8 caracteres" required>
                
                <button type="submit" class="btn-blue">Registrarme Ahora</button>
            </form>
        </div>
    </section>

    <script>
        // Lógica simple para redirigir tras el registro
        document.getElementById('registro-form-completo').addEventListener('submit', (e) => {
            e.preventDefault();
            alert("¡Registro exitoso! Volviendo al inicio...");
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
